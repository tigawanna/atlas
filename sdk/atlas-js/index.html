<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; background: #0a0a0a; color: #fff; }
      
      /* Modern MapLibre Popup Styling */
      .maplibregl-popup-content {
        padding: 0 !important;
        border-radius: 14px !important;
        background: rgba(255, 255, 255, 0.98) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
      }
      .maplibregl-popup-anchor-bottom .maplibregl-popup-tip {
        border-top-color: rgba(255, 255, 255, 0.98) !important;
      }
      .maplibregl-popup-anchor-top .maplibregl-popup-tip {
        border-bottom-color: rgba(255, 255, 255, 0.98) !important;
      }
      .maplibregl-popup-anchor-left .maplibregl-popup-tip {
        border-right-color: rgba(255, 255, 255, 0.98) !important;
      }
      .maplibregl-popup-anchor-right .maplibregl-popup-tip {
        border-left-color: rgba(255, 255, 255, 0.98) !important;
      }

      /* Navigation Controls refinement */
      .maplibregl-ctrl-group {
        border-radius: 12px !important;
        background: rgba(30, 30, 30, 0.85) !important;
        backdrop-filter: blur(8px) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
      }
      .maplibregl-ctrl-group button {
        background: transparent !important;
        color: #fff !important;
      }
      .maplibregl-ctrl-icon {
        filter: invert(1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
